<!DOCTYPE html>
<html>
<head>
    <title>SVG画像テスト</title>
</head>
<body>
    <h1>SVG画像テスト</h1>
    <div id="test-area" style="width: 500px; height: 300px; border: 1px solid #ccc; margin: 20px 0;">
        テスト用エリア
    </div>
    <button onclick="testSVG()">SVG画像を生成・表示</button>
    
    <script>
        // SerenaMCPOfflineImagesの簡易版テスト
        function createTestSVG() {
            const gradient = { start: '#667eea', end: '#764ba2' };
            const width = 500;
            const height = 300;
            
            const svg = `<svg width="${width}" height="${height}" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="testGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:${gradient.start};stop-opacity:1" />
                        <stop offset="100%" style="stop-color:${gradient.end};stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#testGrad)" />
                <circle cx="150" cy="100" r="50" fill="white" opacity="0.3" />
                <circle cx="350" cy="200" r="70" fill="white" opacity="0.2" />
            </svg>`;
            
            return `data:image/svg+xml;base64,${btoa(svg)}`;
        }
        
        function testSVG() {
            const testArea = document.getElementById('test-area');
            const svgUrl = createTestSVG();
            
            console.log('生成されたSVG URL:', svgUrl);
            
            testArea.style.backgroundImage = `url(${svgUrl})`;
            testArea.style.backgroundSize = 'cover';
            testArea.style.backgroundPosition = 'center';
            testArea.innerText = 'SVG画像表示中...';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurioCity 背景画像テスト</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        .test-container {
            width: 100%;
            height: 100vh;
            position: relative;
            /* 段階的背景表示：グラデーション → 画像 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%), url('https://picsum.photos/id/1/1920/1080');
            background-size: cover, cover;
            background-position: center, center;
            background-repeat: no-repeat, no-repeat;
            background-blend-mode: overlay;
            transition: background 0.8s ease-out;
            
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        
        .content {
            background: rgba(0, 0, 0, 0.5);
            padding: 2rem;
            border-radius: 8px;
            z-index: 10;
            position: relative;
        }
        
        .test-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }
        
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="test-container" id="testContainer">
        <div class="content">
            <h1>CurioCity 背景画像表示テスト</h1>
            <p>Picsum Photos APIからの画像が段階的に表示されます</p>
            <p>まずグラデーション背景が表示され、その後に画像がオーバーレイされます</p>
        </div>
        
        <div class="test-buttons">
            <button onclick="changeImage(1)">画像1</button>
            <button onclick="changeImage(100)">画像100</button>
            <button onclick="changeImage(500)">画像500</button>
            <button onclick="removeImage()">画像なし</button>
        </div>
    </div>

    <script>
        function changeImage(imageId) {
            const container = document.getElementById('testContainer');
            const imageUrl = `https://picsum.photos/id/${imageId}/1920/1080`;
            
            console.log('画像変更:', imageUrl);
            
            container.style.background = `linear-gradient(135deg, #667eea 0%, #764ba2 100%), url('${imageUrl}')`;
        }
        
        function removeImage() {
            const container = document.getElementById('testContainer');
            container.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            console.log('画像削除: グラデーションのみ表示');
        }
        
        // 初期状態でのテスト
        console.log('CurioCity 背景画像テストページが読み込まれました');
        console.log('右上のボタンで異なる画像をテストできます');
    </script>
</body>
</html>
